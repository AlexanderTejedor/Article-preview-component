<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--========== favicon ==========-->
    <link rel="shortcut icon" href="./assets/images/favicon-32x32.png" type="image/x-icon">
    <!--========== fonts ==========-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <!--========== Styles ==========-->
    <link rel="stylesheet" href="./style.css">
    <title>Article preview component</title>
</head>
<body>
    <main class="main-container">
        <article class="card-container">
            <figure class="banner-container">
                <img src="./assets/images/drawers.jpg" alt="Modern furniture">
            </figure>
            <section class="card-content">
                <div class="card-info">
                    <h1 class="card-info__title">Shift the overall look and feel by adding these wonderful touches to furniture in your home</h1>
                    <p class="card-info__description">Ever been in a room and felt like something was missing? Perhaps it felt slightly bare and uninviting. I've got some simple tips to help you make any room feel complete.</p>
                </div>
                <div class="card-author">
                    <figure class="card-author__avatar">
                        <img src="./assets/images/avatar-michelle.jpg" alt="Picture to Michelle Appleton">
                    </figure>
                    <div class="card-author__info">
                        <h2 class="card-author__name">Michelle Appleton</h2>
                        <p class="card-author__date">28 Jun 2020</p>
                    </div>
                </div>
                <img class="icon-share" src="./assets/images/icon-share.svg" alt="Icon Share">
            </section>
        </article>
    </main>
</body>
</html>
